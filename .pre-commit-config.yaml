# Pre-commit hooks for the-loop. RULE: CI runs these SAME hooks
# (`uv run pre-commit run --all-files`) so there are no local-vs-CI surprises.
#
# All hooks are `local`/`system` and invoke tools through `uv run`, so they resolve
# the exact versions pinned in uv.lock (the-loop's declared package manager is uv) —
# whether triggered by `git commit`, `pre-commit run`, or CI. markdownlint is a Node
# tool, pinned via npx. This keeps local == CI without duplicate tool installs.
minimum_pre_commit_version: "3.0.0"
default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (lint + autofix)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        files: ^cli/

      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        files: ^cli/

      - id: pyright
        name: pyright (type check cli)
        entry: uv run pyright cli
        language: system
        pass_filenames: false
        files: ^cli/.*\.py$

      - id: pytest
        name: pytest (cli unit tests)
        entry: bash -c 'cd cli && uv run python -m pytest -q'
        language: system
        pass_filenames: false
        files: ^cli/

      - id: markdownlint
        name: markdownlint (all markdown, incl. docs)
        # Pin the exact version so local == CI. RULE: no tooling drift — an unpinned
        # `npx --yes markdownlint-cli2` resolved a combo that crashes under Node 20.
        entry: npx --yes markdownlint-cli2@0.18.1
        language: system
        types: [markdown]

      - id: validate-the-loop-config
        name: validate .the-loop config against schema
        entry: uv run python scripts/validate_config.py
        language: system
        pass_filenames: false
        files: '^\.the-loop/(config\.ya?ml|config\.schema\.json)$|^scripts/validate_config\.py$'

      # Conventional Commits via commitizen (popular, well-maintained) rather than a
      # custom validator, run through `uv run` so the pinned `cz` from uv.lock is used
      # on `git commit` too. Merge/revert messages pass via --allow-abort.
      - id: commitizen
        name: Conventional Commits (commitizen)
        entry: uv run cz check --allow-abort --commit-msg-file
        language: system
        stages: [commit-msg]
