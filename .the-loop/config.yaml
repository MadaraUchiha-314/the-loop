# .the-loop/config.yaml — configuration for the-loop's own repository.
# Validated against .the-loop/config.schema.json.

version: "0.1.0"

ticketing:
  system: github
  github:
    owner: MadaraUchiha-314
    repo: the-loop
    useProjects: true

repository:
  monorepo: false          # the-loop itself is not (yet) a monorepo
  monorepoTool: none
  runScriptsFromRoot: true

workflow:
  specApproach: kiro-3-phase
  requireHumanReviewPerPhase: true
  specDir: docs/specs
  capabilitiesDir: docs/capabilities   # living capability docs — the organized view of specs (issue-25)
  phaseLabelPrefix: "loop:"
  phases:
    - not-started
    - brainstorming          # optional Phase 0 (root artifact: brainstorm.md)
    - requirements-definition
    - design
    - tasks-breakdown
    - implementation
    - needs-review
    - complete

tooling:
  languages: [python]      # the-loop itself: a Python CLI + markdown docs
  packageManager:
    python: uv
  unitTest:
    python: pytest
  integrationTest:
    python: pytest
  lint:
    python: ruff
    markdown: markdownlint
  typeCheck:
    python: pyright
  release:
    python: pypi
    containers: ghcr

testing:
  gherkinDocstrings: required   # integration tests get a Gherkin docstring
  linkRequirements: true
  integrationTestGlobs:
    - cli/tests/test_*_integration.py   # webhook→session routing scenarios (issue-15)
# apiSpecs: omitted — the-loop ships a CLI + docs, not a REST/GraphQL API.

design:
  uiArtifacts:                  # UI/UX (visual) design artifacts — see reference/design-artifacts.md
    dir: design                 # docs/specs/<id>/design/ — checked-in html prototypes / figma exports
    format: html                # html | figma | both (the-loop itself has no product UI)
    selfContained: true         # RULE: html prototypes inline all CSS/JS, no external network deps
    screenshotEvidence: true    # capture rendered screenshots of the locked design as evidence

localOrchestration:
  containerRuntime: podman
  linkPackagesLocally: true
  remoteServices: []

hooks:
  preCommit: [lint, typecheck, unit-test]
  prePush: [lint, typecheck, unit-test]
  commitConvention: conventional-commits

observability:
  devLevel: debug
  runtimeLevel: info
  browserLogging: chrome-devtools-mcp

reviews:
  selfReviewCount: 3
  criticReviewCount: 3
  stopOnNoNewFindings: true       # stop the loop when a round finds nothing new
  escalateOnRepeatFinding: true   # same finding twice in a row -> escalate to a human
  critics: []
  # - name: cursor-gpt
  #   harness: cursor              # free-form; e.g. claude | cursor | aider | continue
  #   model: gpt-5.5
  #   command: "cursor-agent review"   # optional explicit invocation

autonomy:
  defaultTier: 3                  # 1-Trivial … 5-Critical
  inferFromChange: true
  sensitivePaths:
    - "**/*schema*"
    - ".the-loop/config.schema.json"
    - ".github/workflows/**"
  tiers:
    "1": autonomous-complete
    "2": autonomous-complete
    "3": human-approves-pr
    "4": human-approves-pr
    "5": human-approves-spec-and-pr

tdd:
  mode: standard                  # standard | tdd-first | off

minimalism:
  enabled: true
  intensity: standard             # low | standard | high

selfImprovement:
  enabled: true
  maxIndexLines: 200
  writeGateOccurrences: 3

userInteraction:
  diagramFormat: mermaid          # RULE: all diagrams are mermaid
  prSummary:
    required: true                # gate: post the briefing BEFORE requesting human review
    templatePath: .the-loop/templates/pr-briefing.md
    condensed: true               # tell the reviewer where to focus, and in what order
    includeDiagrams: true         # mermaid diagrams explaining the low-level details
    documentInsightsAndDecisions: true
  educateUser: true               # mandatory, not optional

personas:
  - handle: "@MadaraUchiha-314"
    kind: individual
    roles: [product-manager, architect, engineer, approver]

messaging:
  channels: []

externalTools:
  referenceFile: .the-loop/external-tools.md

webhooks:
  ghWebhook:
    host: 127.0.0.1
    port: 8787
    path: /gh-webhook
    secretEnv: THE_LOOP_GH_WEBHOOK_SECRET
    pidfile: .the-loop/gh-webhook.pid
    events: [issues, issue_comment, pull_request, pull_request_review, pull_request_review_comment, workflow_run]
    routing:
      enabled: false                # flip on to route events to registered sessions
      registryDir: .the-loop/sessions
      defaultHarness: claude        # claude | cursor
      spawnOnUnmatched: labeled     # never | always | labeled
      autoExecuteLabel: "the-loop: auto-execute"   # label that opts an issue/PR into autonomous execution
      spawnWorkdir: "."
      maxConcurrentDispatches: 4
      dedupCacheSize: 1024
      dispatchTimeoutSeconds: 1800
      promptTemplate: .the-loop/templates/webhook-event-prompt.md
      spawnPromptTemplate: .the-loop/templates/webhook-autoexecute-prompt.md
      harnessArgs:
        claude: []                  # e.g. [--permission-mode, acceptEdits]
        cursor: []                  # e.g. [--force]
