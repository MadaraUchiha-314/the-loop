# .the-loop/config.yaml — configuration for the-loop's own repository.
# Validated against .the-loop/config.schema.json.

version: "0.1.0"

ticketing:
  system: github
  github:
    owner: MadaraUchiha-314
    repo: the-loop
    useProjects: true

repository:
  monorepo: false          # the-loop itself is not (yet) a monorepo
  monorepoTool: none
  runScriptsFromRoot: true

workflow:
  specApproach: kiro-3-phase
  requireHumanReviewPerPhase: true
  specDir: docs/specs
  capabilitiesDir: docs/capabilities   # living capability docs — the organized view of specs (issue-25)
  phaseLabelPrefix: "loop:"
  phases:
    - not-started
    - brainstorming          # optional Phase 0 (root artifact: brainstorm.md)
    - requirements-definition
    - design
    - tasks-breakdown
    - implementation
    - needs-review
    - complete

tooling:
  languages: [python]      # the-loop itself: a Python CLI + markdown docs
  packageManager:
    python: uv
  unitTest:
    python: pytest
  integrationTest:
    python: pytest
  lint:
    python: ruff
    markdown: markdownlint
  typeCheck:
    python: pyright
  release:
    python: pypi
    containers: ghcr

customInstructions:             # user-provided instruction docs the harness reads before working
  docs: []                      # the-loop's own conventions live in the skill itself; none extra
    # - path: docs/team-conventions.md        # repo-relative, or absolute for per-machine docs
    #   notes: House TS style, naming, PR etiquette.
  onMissing: warn               # warn | error | ignore — when a configured doc is absent

testing:
  gherkinDocstrings: required   # integration tests get a Gherkin docstring
  linkRequirements: true
  integrationTestGlobs:
    - cli/tests/test_*_integration.py   # webhook→session routing scenarios (issue-15)
# apiSpecs: omitted — the-loop ships a CLI + docs, not a REST/GraphQL API.

design:
  uiArtifacts:                  # UI/UX (visual) design artifacts — see reference/design-artifacts.md
    dir: design                 # docs/specs/<id>/design/ — checked-in html prototypes / figma exports
    format: html                # html | figma | both (the-loop itself has no product UI)
    selfContained: true         # RULE: html prototypes inline all CSS/JS, no external network deps
    screenshotEvidence: true    # capture rendered screenshots of the locked design as evidence

localOrchestration:
  containerRuntime: podman
  linkPackagesLocally: true
  remoteServices: []

hooks:
  preCommit: [lint, typecheck, unit-test]
  prePush: [lint, typecheck, unit-test]
  commitConvention: conventional-commits

observability:
  devLevel: debug
  runtimeLevel: info
  browserLogging: chrome-devtools-mcp
  eventLog:                       # structured JSONL o11y trail; `the-loop events`
    enabled: true
    path: .the-loop/logs/events.jsonl

reviews:
  selfReviewCount: 3
  criticReviewCount: 3
  stopOnNoNewFindings: true       # stop the loop when a round finds nothing new
  escalateOnRepeatFinding: true   # same finding twice in a row -> escalate to a human
  critics: []
  # - name: cursor-gpt
  #   harness: cursor              # free-form; e.g. claude | cursor | aider | continue
  #   model: gpt-5.5
  #   command: "cursor-agent review"   # optional explicit invocation

autonomy:
  defaultTier: 3                  # 1-Trivial … 5-Critical
  inferFromChange: true
  sensitivePaths:
    - "**/*schema*"
    - ".the-loop/config.schema.json"
    - ".github/workflows/**"
  tiers:
    "1": autonomous-complete
    "2": autonomous-complete
    "3": human-approves-pr
    "4": human-approves-pr
    "5": human-approves-spec-and-pr

security:                         # security woven into the phase gates (reference/security.md)
  threatModel:
    required: true                # requirements/bugfix carry a Security considerations section
    projectDoc: ""                # optional living threat-model doc (empty = per-work-item sections only)
  design:
    required: true                # design.md enforces every trust boundary from the requirements
  review:
    required: true                # ready-to-ship gate: a security review must pass
    mechanism: auto               # auto = built-in security-review skill when available, else the checklist | skill | checklist
    humanSignOffMinTier: 4        # risk tier >= this needs a named human security sign-off (6 = never)

tdd:
  mode: standard                  # standard | tdd-first | off

minimalism:
  enabled: true
  intensity: standard             # low | standard | high

tokenEconomy:                     # token/cost levers (issue-37) — advisory, never a gate.
  enabled: true                   # See reference/token-economy.md. Tier→model ids left empty:
  modelRouting:                   # the-loop dogfoods on whatever model the operator runs.
    enabled: true
    tiers:
      economy:  {}
      standard: {}
      frontier: {}
    stages:
      brainstorm: frontier
      requirements: frontier
      design: frontier
      tasks: standard
      implementation: standard
      self-review: standard
      critic-review: frontier
      evidence: economy
      capability-docs: economy
      reviewer-briefing: economy
      status: economy
      learnings: economy
    riskTierFloor:
      "4": standard
      "5": frontier
  thinkingEffort:
    enabled: true
    stages:
      design: high
      critic-review: high
      implementation: medium
      capability-docs: low
      reviewer-briefing: low
      evidence: none
      status: none
  outputVerbosity:
    mode: concise
    preserve: [code, commands, diffs, errors, paper-trail-comments, reviewer-briefing, specs, decisions, capability-docs]
  progressiveDisclosure:
    enabled: true
    phaseScoped: true
  subAgentDelegation:
    enabled: true
  compaction:
    enabled: true
  telemetry:
    enabled: true

selfImprovement:
  enabled: true
  maxIndexLines: 200
  writeGateOccurrences: 3

contextManagement:               # checkpoint-then-reset — see reference/context.md
  enabled: true
  phaseBoundary: clear           # locked spec → fresh window for implementation (plan-mode style)
  taskBoundary: compact          # after each completed task: checkpoint, then compact
  midTask: compact               # never clear mid-task; compact only, after a checkpoint

userInteraction:
  diagramFormat: mermaid          # RULE: all diagrams are mermaid
  prSummary:
    required: true                # gate: post the briefing BEFORE requesting human review
    templatePath: skills/the-loop/templates/pr-briefing.md   # the-loop's internal template (under ${CLAUDE_PLUGIN_ROOT})
    condensed: true               # tell the reviewer where to focus, and in what order
    includeDiagrams: true         # mermaid diagrams explaining the low-level details
    documentInsightsAndDecisions: true
  educateUser: true               # mandatory, not optional

personas:
  - handle: "@MadaraUchiha-314"
    kind: individual
    roles: [product-manager, architect, engineer, approver]

messaging:
  channels: []

externalTools:                    # inline registry — one YAML for easy onboarding (issue-37)
  tools:
    - name: github
      kind: mcp
      notes: GitHub issues/PRs/Actions via MCP.
    - name: the-loop
      kind: plugin
      notes: This plugin.
    - name: caveman
      kind: skill
      url: https://github.com/JuliusBrussee/caveman
      notes: >-
        Output-token compression (drops narration filler; never touches
        code/commands/errors). the-loop expresses this natively via
        tokenEconomy.outputVerbosity — install if you prefer the packaged skill.
        Its preservation rules must not compress the reviewer briefing or
        paper-trail comments. (issue-37)
    - name: ponytail
      kind: skill
      url: https://github.com/DietrichGebert/ponytail
      notes: >-
        Generation-minimalism decision ladder (YAGNI → reuse → stdlib → native →
        dep → one-liner). the-loop expresses this natively via
        reference/minimalism.md / config.minimalism — install if you prefer the
        packaged skill. (issue-37)
  notes: >-
    caveman and ponytail are registered, not vendored — the-loop implements
    their techniques natively (tokenEconomy / minimalism) and bundles no runtime
    (decision-005). Register-only: the harness may use them if installed.

webhooks:
  ghWebhook:
    host: 127.0.0.1
    port: 8787
    path: /gh-webhook
    secretEnv: THE_LOOP_GH_WEBHOOK_SECRET
    pidfile: .the-loop/gh-webhook.pid
    events: [issues, issue_comment, pull_request, pull_request_review, pull_request_review_comment, workflow_run]
    routing:
      enabled: false                # flip on to route events to registered sessions
      registryDir: .the-loop/sessions
      defaultHarness: claude        # claude | cursor
      spawnOnUnmatched: labeled     # never | always | labeled
      autoExecuteLabel: "the-loop: auto-execute"   # label that opts an issue/PR into autonomous execution
      spawnWorkdir: "."
      runner: process             # process (headless) | tmux (attachable interactive TUI — issue-32)
      webTerminal:                # ttyd browser terminal onto tmux sessions (runner: tmux)
        enabled: false            # access control is environmental: localhost/VPN/provider (decision-021)
        host: 127.0.0.1
        port: 7681
      maxConcurrentDispatches: 4
      dedupCacheSize: 1024
      dispatchTimeoutSeconds: 1800
      promptTemplate: skills/the-loop/templates/webhook-event-prompt.md          # internal template; dispatcher falls back to a built-in default when absent
      spawnPromptTemplate: skills/the-loop/templates/webhook-autoexecute-prompt.md  # internal template; dispatcher falls back to a built-in default when absent
      harnessArgs:
        claude: []                  # e.g. [--permission-mode, acceptEdits]
        cursor: []                  # e.g. [--force]
