# .the-loop/cli-config.yaml — the-loop's own CLI-daemon config, checked in for
# local dev/dogfooding. Validated against .the-loop/cli-config.schema.json.
#
# The daemon (gh-webhook / poll / sessions / events) is not tied to any one
# repo checkout (decision-032), so this file isn't required to live here — but
# it CAN: an operator may choose to track their CLI config in a specific repo
# (e.g. this one) instead of their home directory. Resolution order:
#   1. --config / -c (explicit CLI flag)
#   2. $THE_LOOP_CLI_CONFIG (explicit env var, same priority as --config)
#   3. ./.the-loop/cli-config.yaml (repo-relative — this file, picked up
#      automatically when `the-loop <command>` is run from this checkout)
#   4. ~/.the-loop/cli-config.yaml (the always-available fallback)
#
# See .the-loop/config.yaml for the-loop's own PLUGIN config (ticketing,
# workflow, tooling, reviews, …).

version: "0.1.0"

webhooks:
  ghWebhook:
    host: 127.0.0.1
    port: 8787
    path: /gh-webhook
    secretEnv: THE_LOOP_GH_WEBHOOK_SECRET
    pidfile: .the-loop/gh-webhook.pid
    events: [issues, issue_comment, pull_request, pull_request_review, pull_request_review_comment, workflow_run]
    routing:
      enabled: false                # flip on to route events to registered sessions
      registryDir: .the-loop/sessions
      defaultHarness: claude        # claude | cursor
      spawnOnUnmatched: labeled     # never | always | labeled
      autoExecuteLabel: "the-loop: auto-execute"   # label that opts an issue/PR into autonomous execution
      # SECURITY: no fallback to this repo's plugin config (issue-63 review) —
      # empty here means nothing human-authored is actioned (fail closed).
      # Set this explicitly, e.g. ["MadaraUchiha-314"], to actually route events.
      authorizedUsers: []
      spawnWorkdir: "."             # used only when workspace.root is unset (below)
      # Per-work-item checkout workspace (issue-76): set `root` to check out each event's
      # repo under it and run the spawned session there, cleaned up on PR merge/close.
      # Empty = legacy spawnWorkdir. strategy: worktree (shared clone + per-item worktree)
      # or clone (one folder per work item, full clone of each repo it touches).
      workspace:
        root: ""                    # e.g. ~/.the-loop/workspace (empty = disabled)
        strategy: worktree          # worktree | clone
        cloneProtocol: https        # https | ssh
        defaultHost: github.com     # host dir when the payload has no html_url (set to your GHE domain)
        keepCheckoutOnClose: false  # keep the work item's checkout after PR close (for post-mortem)
        gitBinary: git
      runner: process             # process (headless) | tmux (attachable interactive TUI — issue-32)
      # Lifetime of the tmux-hosted sessions (issue-86): a finished session stays
      # readable. keepSessionOnClose leaves the tmux session running when the work
      # item closes (PR merged/closed or `sessions close`); remainOnExit keeps the
      # pane + scrollback when the harness process itself exits. Retained sessions
      # accumulate — `the-loop sessions list --status closed` shows them, and a new
      # spawn for the same work item reclaims the loop-<slug> name.
      tmux:
        keepSessionOnClose: true
        remainOnExit: true
      webTerminal:                # ttyd browser terminal onto tmux sessions (runner: tmux)
        enabled: false            # access control is environmental: localhost/VPN/provider (decision-021)
        host: 127.0.0.1
        port: 7681
      maxConcurrentDispatches: 4
      dedupCacheSize: 1024
      dispatchTimeoutSeconds: 1800
      promptTemplate: skills/the-loop/templates/webhook-event-prompt.md          # internal template; dispatcher falls back to a built-in default when absent
      spawnPromptTemplate: skills/the-loop/templates/webhook-autoexecute-prompt.md  # internal template; dispatcher falls back to a built-in default when absent
      harnessArgs:
        claude: []                  # e.g. [--permission-mode, acceptEdits]
        cursor: []                  # e.g. [--force]
      # Dispatch-lifecycle emoji reactions (issue-84): acknowledge on the triggering
      # comment (or the issue/PR itself) that the-loop started / completed / failed
      # processing an event. GitHub's palette is fixed (+1 -1 laugh confused heart
      # hooray rocket eyes) — ✅/⁉️ don't exist, so defaults are the closest match.
      # Best-effort via the operator's gh CLI; no-op when gh is absent, a state is
      # "", or the event has no reactable GitHub target. Default true (owner
      # decision, PR #85); posts with YOUR gh auth — set enabled: false to opt out.
      reactions:
        enabled: true
        started: eyes               # 👀 event dequeued for delivery/spawn
        completed: hooray           # 🎉 dispatch succeeded
        error: confused             # 😕 dispatch failed / worker crashed
        ghBinary: gh
      # Session announcement comment (issue-86): when a tmux-mode session is
      # spawned/respawned, post the tmux session name + `tmux attach -t …` on the
      # work item so a human can watch it work. Best-effort via your gh CLI; no-op
      # for process-runner sessions, non-GitHub work items, or a missing gh. The
      # body carries no paths, session ids or hostnames.
      announce:
        enabled: true
        ghBinary: gh

polling:
  intervalSeconds: 60
  stateFile: .the-loop/poll-state.json
  maxRetries: 3                     # per-event delivery attempts before giving up (issue-80): a failing spawn/comment is retried each cycle up to this many times, then logged (poll.*_failed) and ignored until new activity re-arms it
  sources: []                       # empty = nothing polled; this repo dogfoods webhooks, not poll

eventLog:                           # structured JSONL o11y trail; `the-loop events`
  enabled: true
  path: .the-loop/logs/events.jsonl

# The operator's own notification recipients (issue-82, decision-035) — the same
# collaborator structure as .the-loop/collaborators.schema.json, DECLARED here:
# the CLI daemon never reads any repo's collaborators.yaml.
collaborators: []
  # - handle: "@MadaraUchiha-314"
  #   kind: individual
  #   roles: [engineer, approver]
  #   notifications:
  #     enabled: true
  #     channels:
  #       - type: slack             # only supported type for now
  #         enabled: true
  #         via: mcp                # mcp | cli | api
  #         config:
  #           channel-list: []      # e.g. ["#the-loop-daemon"]

# Which DAEMON-side events notify which roles from `collaborators` above.
# Disjoint from the harness-side taxonomy in harness-config.yaml.
notifications:
  enabled: true
  events: {}                        # event → roles; omitted event = nobody notified
    # work-item-spawned: [engineer]
    # dispatch-failed: [engineer]
    # session-died: [engineer]
    # event-dropped-unauthorized: [engineer]
