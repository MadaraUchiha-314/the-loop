# .the-loop/config.yaml
# Generated by `/the-loop:init`. Validated against .the-loop/config.schema.json.
# A subset of these keys can be overridden per work-item in the YAML front-matter
# of the work-item / spec markdown.

version: "0.1.0"

ticketing:
  system: github          # github | jira
  github:
    owner: ""             # e.g. MadaraUchiha-314
    repo: ""              # e.g. the-loop
    useProjects: true

repository:
  monorepo: true
  monorepoTool: nx        # nx | yarn | pnpm | bun | none
  runScriptsFromRoot: true

workflow:
  specApproach: kiro-3-phase        # (optional brainstorm ->) requirements/bugfix -> design -> tasks
  requireHumanReviewPerPhase: true
  specDir: docs/specs
  phaseLabelPrefix: "loop:"
  phases:
    - not-started
    - brainstorming          # optional Phase 0 (root artifact: brainstorm.md)
    - requirements-definition
    - design
    - tasks-breakdown
    - implementation
    - needs-review
    - complete

tooling:
  languages: [ts]         # python | js | ts | go
  packageManager:
    python: uv
    ts: bun
    go: go
  unitTest:
    python: pytest
    ts: vitest
    go: go test
  integrationTest:
    python: pytest
    ts: playwright
    go: go test
  lint:
    python: ruff
    ts: oxlint
    go: golangci-lint
    markdown: markdownlint
  typeCheck:
    python: pyright
    ts: tsc
    go: go build
  release:
    ts: npm
    python: pypi
    go: go-modules
    containers: ghcr

testing:
  gherkinDocstrings: required   # required | recommended | off — Gherkin docstring per integration test
  linkRequirements: true        # link the docstring to requirements.md when the test is tied to one
  integrationTestGlobs: []      # where `the-loop scenarios` looks (empty = CLI built-in defaults)

apiSpecs:
  rest:
    dir: specs/openapi          # RULE: all RESTful API specs authored here in OpenAPI format
    format: openapi-3.1         # openapi-3.1 | openapi-3.0
    generateDocs: true          # docs generated automatically from the OpenAPI specs
    docsTool: redocly           # free-form: redocly | widdershins | swagger-ui | …
  graphql:                      # best practice: SDL-first, checked in, snapshot-tested, documented
    dir: specs/graphql
    schemaFormat: sdl
    generateDocs: true
    docsTool: spectaql          # free-form: spectaql | graphdoc | magidoc | …

localOrchestration:
  containerRuntime: podman
  linkPackagesLocally: true
  remoteServices: []

hooks:
  preCommit: [lint, typecheck, unit-test]
  prePush: [lint, typecheck, unit-test]
  commitConvention: conventional-commits   # all commits follow Conventional Commits

observability:
  devLevel: debug
  runtimeLevel: info
  browserLogging: chrome-devtools-mcp

reviews:
  selfReviewCount: 3              # cap; loop stops early on zero new findings
  criticReviewCount: 3
  stopOnNoNewFindings: true       # stop when a round finds nothing new actionable
  escalateOnRepeatFinding: true   # same finding twice in a row -> escalate to a human
  critics: []
  # - name: cursor-gpt
  #   harness: cursor              # free-form; e.g. claude | cursor | aider | continue
  #   model: gpt-5.5
  #   command: "cursor-agent review"   # optional explicit invocation

autonomy:                         # risk-tiered autonomy (see reference/workflow.md)
  defaultTier: 3                  # 1-Trivial … 5-Critical (or set riskTier per work item)
  inferFromChange: true           # bump tier when sensitive paths are touched
  sensitivePaths: []              # e.g. ["**/auth/**", "**/*secret*", "**/*schema*"]
  tiers:
    "1": autonomous-complete      # may finish after the review loop passes
    "2": autonomous-complete
    "3": human-approves-pr
    "4": human-approves-pr
    "5": human-approves-spec-and-pr

tdd:
  mode: standard                  # standard = red→green per task | tdd-first | off

minimalism:
  enabled: true                   # advisory generation-time bloat guard
  intensity: standard             # low | standard | high

selfImprovement:
  enabled: true
  maxIndexLines: 200              # cap on the injected learnings index
  writeGateOccurrences: 3         # rule-of-three before a candidate becomes durable

userInteraction:
  diagramFormat: mermaid          # RULE: all diagrams are mermaid
  prSummary:
    required: true                # gate: post the briefing BEFORE requesting human review
    templatePath: .the-loop/templates/pr-briefing.md
    condensed: true               # tell the reviewer where to focus, and in what order
    includeDiagrams: true         # mermaid diagrams explaining the low-level details
    documentInsightsAndDecisions: true
  educateUser: true               # mandatory, not optional

personas: []
  # - handle: "@MadaraUchiha-314"
  #   kind: individual
  #   roles: [product-manager, architect, engineer, approver]

messaging:
  channels: []
  # - type: slack
  #   target: "#the-loop"

externalTools:
  referenceFile: .the-loop/external-tools.md

webhooks:
  ghWebhook:
    host: 127.0.0.1
    port: 8787
    path: /gh-webhook
    secretEnv: THE_LOOP_GH_WEBHOOK_SECRET   # env var holding the secret (not stored here)
    pidfile: .the-loop/gh-webhook.pid
    events: []   # e.g. [issues, issue_comment, pull_request, workflow_run]; empty = all
    routing:
      enabled: false                # route events to registered harness sessions
      registryDir: .the-loop/sessions
      defaultHarness: claude        # claude | cursor
      spawnOnUnmatched: labeled     # never | always | labeled
      autoExecuteLabel: "the-loop: auto-execute"   # label that opts an issue/PR into autonomous execution
      spawnWorkdir: "."
      maxConcurrentDispatches: 4
      dedupCacheSize: 1024
      dispatchTimeoutSeconds: 1800
      promptTemplate: .the-loop/templates/webhook-event-prompt.md
      spawnPromptTemplate: .the-loop/templates/webhook-autoexecute-prompt.md
      harnessArgs:
        claude: []                  # e.g. [--permission-mode, acceptEdits]
        cursor: []                  # e.g. [--force]
