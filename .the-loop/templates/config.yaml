# .the-loop/config.yaml
# Generated by `/the-loop:init`. Validated against .the-loop/config.schema.json.
# A subset of these keys can be overridden per work-item in the YAML front-matter
# of the work-item / spec markdown.

version: "0.1.0"

ticketing:
  system: github          # github | jira
  github:
    owner: ""             # e.g. MadaraUchiha-314
    repo: ""              # e.g. the-loop
    useProjects: true

repository:
  monorepo: true
  monorepoTool: nx        # nx | yarn | pnpm | bun | none
  runScriptsFromRoot: true

workflow:
  specApproach: kiro-3-phase        # requirements/bugfix -> design -> tasks
  requireHumanReviewPerPhase: true
  specDir: docs/specs
  phaseLabelPrefix: "loop:"
  phases:
    - not-started
    - requirements-definition
    - design
    - tasks-breakdown
    - implementation
    - needs-review
    - complete

tooling:
  languages: [ts]         # python | js | ts | go
  packageManager:
    python: uv
    ts: bun
    go: go
  unitTest:
    python: pytest
    ts: vitest
    go: go test
  integrationTest:
    python: pytest
    ts: playwright
    go: go test
  lint:
    python: ruff
    ts: oxlint
    go: golangci-lint
    markdown: markdownlint
  typeCheck:
    python: pyright
    ts: tsc
    go: go build
  release:
    ts: npm
    python: pypi
    go: go-modules
    containers: ghcr

localOrchestration:
  containerRuntime: podman
  linkPackagesLocally: true
  remoteServices: []

hooks:
  preCommit: [lint, typecheck, unit-test]
  prePush: [lint, typecheck, unit-test]
  commitConvention: conventional-commits   # all commits follow Conventional Commits

observability:
  devLevel: debug
  runtimeLevel: info
  browserLogging: chrome-devtools-mcp

reviews:
  selfReviewCount: 3
  criticReviewCount: 3
  critics: []
  # - name: cursor-gpt
  #   harness: cursor
  #   model: gpt-5.5

userInteraction:
  diagramFormat: mermaid          # RULE: all diagrams are mermaid
  prSummary:
    condensed: true               # tell the reviewer where to focus, and in what order
    includeDiagrams: true         # mermaid diagrams explaining the low-level details
    documentInsightsAndDecisions: true
  educateUser: true               # mandatory, not optional

personas: []
  # - handle: "@MadaraUchiha-314"
  #   kind: individual
  #   roles: [product-manager, architect, engineer, approver]

messaging:
  channels: []
  # - type: slack
  #   target: "#the-loop"

externalTools:
  referenceFile: .the-loop/external-tools.md

webhooks:
  ghWebhook:
    host: 127.0.0.1
    port: 8787
    path: /gh-webhook
    secretEnv: THE_LOOP_GH_WEBHOOK_SECRET   # env var holding the secret (not stored here)
    pidfile: .the-loop/gh-webhook.pid
    events: []   # e.g. [pull_request_review_comment, workflow_run]
