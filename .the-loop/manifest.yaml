# .the-loop/manifest.yaml
# Tracks every file that "the-loop" creates, maintains or tracks within a project.
# Used by /the-loop:init and /the-loop:upgrade-the-loop to know what exists and
# what needs to be created or reconciled.

manifestVersion: "0.1.0"
theLoopVersion: "0.1.0"

# Files internal to the-loop (meta). These live under .the-loop/.
meta:
  - path: .the-loop/config.yaml
    role: project-config
    managed: true
  - path: .the-loop/config.schema.json
    role: config-schema
    managed: true
  - path: .the-loop/manifest.yaml
    role: manifest
    managed: true
  - path: .the-loop/external-tools.md
    role: external-tools-registry
    managed: false   # user-owned free-form content
  - path: .the-loop/collaborators.yaml
    role: collaborators
    managed: false

templates:
  - path: .the-loop/templates/epic.md
  - path: .the-loop/templates/story.md
  - path: .the-loop/templates/bug.md
  - path: .the-loop/templates/delivery-plan.md
  - path: .the-loop/templates/execution-log.md
  - path: .the-loop/templates/decision.md
  - path: .the-loop/templates/learning.md
  - path: .the-loop/templates/config.yaml
  - path: .the-loop/templates/collaborators.yaml

# Per-work-item artifacts. <id> is the ticket id (e.g. issue-1, PROJ-42).
# These MUST be checked in.
workItemArtifacts:
  - pathPattern: docs/delivery-plans/<id>-delivery-plan.md
    role: delivery-plan
  - pathPattern: docs/execution-logs/<id>-execution-log.md
    role: execution-log

# Long-lived project knowledge maintained by the-loop.
knowledge:
  - path: docs/architecture/architecture.md
    role: architecture-index
  - path: docs/decisions/decisions.md
    role: decisions-index
  - pathPattern: docs/decisions/decision-<nnn>.md
    role: decision-record
  - path: learnings/learnings.md
    role: learnings-index
  - pathPattern: learnings/learning-<nnn>.md
    role: learning-record
