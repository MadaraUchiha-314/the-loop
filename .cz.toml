# commitizen config for the-loop. Enforces Conventional Commits v1.0.0 via the
# commit-msg pre-commit hook (`cz check`) and drives automated releases: on merge to
# main, `.github/workflows/release.yml` runs `cz bump` to compute the next version from
# the conventional-commit types since the last tag (feat -> minor, fix -> patch,
# BREAKING CHANGE -> major), tag it, and publish to PyPI. See docs/decisions/decision-019.md.
# See https://commitizen-tools.github.io/commitizen/
[tool.commitizen]
name = "cz_conventional_commits"
version = "0.14.1"
tag_format = "v$version"
version_scheme = "semver"
# commitizen owns the canonical version (the `version` field above). `version_files`
# keeps every other artifact that carries a version in lockstep, so a bump rewrites
# them all in the same commit: the published distribution's `[project] version` and the
# Claude Code / Cursor plugin + marketplace manifests (issue #46, decision-028). On a
# matching line commitizen replaces the CURRENT version string with the new one, so
# each file must already carry the current version — guarded by
# `scripts/check_version_lockstep.py`, run on every PR via the CLI test suite
# (`cli/tests/test_version_lockstep.py`).
version_files = [
    "cli/pyproject.toml:^version = ",
    ".claude-plugin/plugin.json:\"version\"",
    ".claude-plugin/marketplace.json:\"version\"",
    ".cursor-plugin/plugin.json:\"version\"",
    ".cursor-plugin/marketplace.json:\"version\"",
]
# The changelog is generated at release time by the workflow (--changelog), not committed
# from developer machines, so a plain `cz bump` locally doesn't require a CHANGELOG.md.
update_changelog_on_bump = false
