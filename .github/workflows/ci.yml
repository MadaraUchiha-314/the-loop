name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install exactly the tooling the local hooks use, then run the SAME
      # pre-commit hooks. RULE: no local-vs-CI tooling drift.
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit "ruff==0.15.8" pyright pytest jsonschema pyyaml commitizen
          pip install -e ./cli

      - name: Run pre-commit (lint, format, type-check, markdownlint, tests, schema)
        run: pre-commit run --all-files --show-diff-on-failure

      # Structural invariant: the repo tree matches the manifest's knowledge files.
      - name: Validate JSON artifacts parse
        run: |
          python -c "import json; [json.load(open(p)) for p in ['.claude-plugin/plugin.json', '.claude-plugin/marketplace.json', '.the-loop/config.schema.json', 'hooks/hooks.json']]; print('json ok')"
