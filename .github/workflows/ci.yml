name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 22 matches the local dev environment (markdownlint runs under it).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Install uv (the-loop's declared Python package manager), then `uv sync` the
      # workspace from uv.lock. RULE: no local-vs-CI tooling drift — the same pinned
      # versions run locally and here.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync workspace (uv.lock)
        run: uv sync

      # Run the SAME pre-commit hooks the developer runs locally, via uv.
      - name: Run pre-commit (lint, format, type-check, markdownlint, tests, schema)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      # Structural invariant: the repo tree matches the manifest's knowledge files.
      - name: Validate JSON artifacts parse
        run: |
          uv run python -c "import json; [json.load(open(p)) for p in ['.claude-plugin/plugin.json', '.claude-plugin/marketplace.json', '.cursor-plugin/plugin.json', '.cursor-plugin/marketplace.json', '.the-loop/config.schema.json', 'hooks/hooks.json']]; print('json ok')"
