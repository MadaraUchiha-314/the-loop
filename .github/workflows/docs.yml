# Docs site — build the VitePress site in docs/ (docs/.vitepress/) and deploy it to
# GitHub Pages on every push to main. See docs/contributing.md and issue-70.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - cli/README.md
      - skills/the-loop/reference/**
      - skills/the-loop/SKILL.md
      - .github/workflows/docs.yml
  workflow_dispatch:

# Only one deploy in flight at a time; a newer push supersedes an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: docs
        run: bun run docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
