# Docs site — build the VitePress site in docs-site/ and deploy it to GitHub Pages on
# every push to main. See docs-site/README.md and issue-70.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs-site/**
      - docs/**
      - cli/README.md
      - skills/the-loop/reference/**
      - skills/the-loop/SKILL.md
      - .github/workflows/docs.yml
  workflow_dispatch:

# Only one deploy in flight at a time; a newer push supersedes an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build
        working-directory: docs-site
        run: npm run docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
