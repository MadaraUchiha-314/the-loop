# .the-loop/config.yaml — PLUGIN configuration (per repo).
# Generated by `/the-loop:init`. Validated against .the-loop/config.schema.json.
# The values below are the sensible-defaults baseline; init adjusts them per project
# via detection + the guided onboarding (the schema's x-onboarding groups; see the
# the-loop skill's reference/onboarding.md).
# A subset of these keys can be overridden per work-item in the YAML front-matter
# of the work-item / spec markdown.
# The CLI daemon (gh-webhook/poll/sessions/events) is configured separately — it is
# not tied to this repo. See templates/cli-config.yaml and decision-031.

version: "0.1.0"

ticketing:
  system: github          # github | jira
  github:
    owner: ""             # e.g. MadaraUchiha-314
    repo: ""              # e.g. the-loop
    useProjects: true

repository:
  monorepo: true
  monorepoTool: nx        # nx | yarn | pnpm | bun | none
  runScriptsFromRoot: true

workflow:
  specApproach: kiro-3-phase        # (optional brainstorm ->) requirements/bugfix -> design -> tasks
  requireHumanReviewPerPhase: true
  specDir: docs/specs
  capabilitiesDir: docs/capabilities  # living capability docs — organized view of specs; updated in the same PR (gate)
  phaseLabelPrefix: "loop:"
  phases:
    - not-started
    - brainstorming          # optional Phase 0 (root artifact: brainstorm.md)
    - requirements-definition
    - design
    - tasks-breakdown
    - implementation
    - needs-review
    - complete

tooling:
  languages: [ts]         # python | js | ts | go
  packageManager:
    python: uv
    ts: bun
    go: go
  unitTest:
    python: pytest
    ts: vitest
    go: go test
  integrationTest:
    python: pytest
    ts: playwright
    go: go test
  lint:
    python: ruff
    ts: oxlint
    go: golangci-lint
    markdown: markdownlint
  typeCheck:
    python: pyright
    ts: tsc
    go: go build
  release:
    ts: npm
    python: pypi
    go: go-modules
    containers: ghcr

customInstructions:             # user-provided instruction docs the harness reads before working
  docs: []                      # ordered; later docs win on conflict — reference/instructions.md
    # - path: docs/team-conventions.md        # repo-relative, or absolute for per-machine docs
    #   notes: House TS style, naming, PR etiquette.
  onMissing: warn               # warn | error | ignore — when a configured doc is absent

testing:
  gherkinDocstrings: required   # required | recommended | off — Gherkin docstring per integration test
  linkRequirements: true        # link the docstring to requirements.md when the test is tied to one
  integrationTestGlobs: []      # where `the-loop scenarios` looks (empty = CLI built-in defaults)

apiSpecs:
  rest:
    dir: specs/openapi          # RULE: all RESTful API specs authored here in OpenAPI format
    format: openapi-3.1         # openapi-3.1 | openapi-3.0
    generateDocs: true          # docs generated automatically from the OpenAPI specs
    docsTool: redocly           # free-form: redocly | widdershins | swagger-ui | …
  graphql:                      # best practice: SDL-first, checked in, snapshot-tested, documented
    dir: specs/graphql
    schemaFormat: sdl
    generateDocs: true
    docsTool: spectaql          # free-form: spectaql | graphdoc | magidoc | …

design:
  uiArtifacts:                  # UI/UX (visual) design in the design phase — reference/design-artifacts.md
    dir: design                 # docs/specs/<id>/design/ — checked-in html prototypes / figma exports
    format: html                # html | figma | both — how generated visual design is represented
    selfContained: true         # RULE: html prototypes inline all CSS/JS, no external network deps
    screenshotEvidence: true    # capture rendered screenshots of the locked design as evidence

localOrchestration:
  containerRuntime: podman
  linkPackagesLocally: true
  remoteServices: []

hooks:
  preCommit: [lint, typecheck, unit-test]
  prePush: [lint, typecheck, unit-test]
  commitConvention: conventional-commits   # all commits follow Conventional Commits

observability:
  devLevel: debug
  runtimeLevel: info
  browserLogging: chrome-devtools-mcp
  # eventLog lives in the CLI config (templates/cli-config.yaml), not here (decision-031)

reviews:
  selfReviewCount: 3              # cap; loop stops early on zero new findings
  criticReviewCount: 3
  stopOnNoNewFindings: true       # stop when a round finds nothing new actionable
  escalateOnRepeatFinding: true   # same finding twice in a row -> escalate to a human
  critics: []
  # - name: cursor-gpt
  #   harness: cursor              # free-form; e.g. claude | cursor | aider | continue
  #   model: gpt-5.5
  #   command: "cursor-agent review"   # optional explicit invocation

autonomy:                         # risk-tiered autonomy (see reference/workflow.md)
  defaultTier: 3                  # 1-Trivial … 5-Critical (or set riskTier per work item)
  inferFromChange: true           # bump tier when sensitive paths are touched
  sensitivePaths: []              # e.g. ["**/auth/**", "**/*secret*", "**/*schema*"]
  tiers:
    "1": autonomous-complete      # may finish after the review loop passes
    "2": autonomous-complete
    "3": human-approves-pr
    "4": human-approves-pr
    "5": human-approves-spec-and-pr

security:                         # security woven into the phase gates (reference/security.md)
  threatModel:
    required: true                # requirements/bugfix carry a Security considerations section
    projectDoc: ""                # optional living threat-model doc (empty = per-work-item sections only)
  design:
    required: true                # design.md enforces every trust boundary from the requirements
  review:
    required: true                # ready-to-ship gate: a security review must pass
    mechanism: auto               # auto = built-in security-review skill when available, else the checklist | skill | checklist
    humanSignOffMinTier: 4        # risk tier >= this needs a named human security sign-off (6 = never)

tdd:
  mode: standard                  # standard = red→green per task | tdd-first | off

minimalism:
  enabled: true                   # advisory generation-time bloat guard
  intensity: standard             # low | standard | high

tokenEconomy:                     # token/cost levers (issue-37) — ADVISORY, never a gate;
  enabled: true                   #   cheaper never means sloppier. See reference/token-economy.md
  modelRouting:                   # cheap work shouldn't pay frontier-model prices
    enabled: true
    tiers:                        # bind abstract tiers to concrete per-harness model ids
      economy:  {}                #   e.g. {claude: <fast/cheap model>, cursor: <cheap model>}
      standard: {}                #   e.g. {claude: <balanced model>}
      frontier: {}                #   e.g. {claude: <most capable model>}  (empty = harness default)
    stages:                       # stage → tier (reasoning-heavy = frontier; mechanical = economy)
      brainstorm: frontier
      requirements: frontier
      design: frontier
      tasks: standard
      implementation: standard
      self-review: standard
      critic-review: frontier
      evidence: economy
      capability-docs: economy
      reviewer-briefing: economy
      status: economy
      learnings: economy
    riskTierFloor:                # high-risk work never drops below this tier
      "4": standard
      "5": frontier
  thinkingEffort:                 # don't burn reasoning tokens on mechanical steps
    enabled: true
    stages:
      design: high
      critic-review: high
      implementation: medium
      capability-docs: low
      reviewer-briefing: low
      evidence: none
      status: none
  outputVerbosity:                # caveman-style: compress the agent's NARRATION only
    mode: concise                 # concise | standard
    preserve:                     # never compressed — contracts & paper trail
      - code
      - commands
      - diffs
      - errors
      - paper-trail-comments
      - reviewer-briefing
      - specs
      - decisions
      - capability-docs
  progressiveDisclosure:          # load only the reference doc a step needs
    enabled: true
    phaseScoped: true
  subAgentDelegation:             # verbose reads (tests/docs/logs) run in a fresh-context sub-agent
    enabled: true
  compaction:                     # checkpoint to disk, then compact preserving spec + open threads
    enabled: true
  telemetry:                      # record per-work-item token/cost so levers tune against a baseline
    enabled: true

selfImprovement:
  enabled: true
  maxIndexLines: 200              # cap on the injected learnings index
  writeGateOccurrences: 3         # rule-of-three before a candidate becomes durable

contextManagement:                # checkpoint-then-reset — see reference/context.md
  enabled: true
  phaseBoundary: clear            # clear | compact | off — locked spec → fresh window (plan-mode style)
  taskBoundary: compact           # clear | compact | off — after each completed task, checkpoint then reset
  midTask: compact                # compact | off — never clear inside an unfinished task

userInteraction:
  diagramFormat: mermaid          # RULE: all diagrams are mermaid
  prSummary:
    required: true                # gate: post the briefing BEFORE requesting human review
    templatePath: skills/the-loop/templates/pr-briefing.md   # the-loop's internal template (under ${CLAUDE_PLUGIN_ROOT})
    condensed: true               # tell the reviewer where to focus, and in what order
    includeDiagrams: true         # mermaid diagrams explaining the low-level details
    documentInsightsAndDecisions: true
  educateUser: true               # mandatory, not optional

personas: []
  # - handle: "@MadaraUchiha-314"
  #   kind: individual
  #   roles: [product-manager, architect, engineer, approver]

messaging:
  channels: []
  # - type: slack
  #   target: "#the-loop"

externalTools:                    # inline registry the harness may freely use (one YAML)
  tools:                          # add MCPs / CLIs / skills / plugins the-loop should know about
    - name: github               # e.g. GitHub issues/PRs/Actions via MCP
      kind: mcp
    # - name: gh                 # kind: mcp | cli | skill | plugin | other
    #   kind: cli
    #   url: https://cli.github.com
    #   notes: auth via GH_TOKEN; read-only in CI.
  notes: ""                       # global free-form: auth, access patterns, constraints

# webhooks / polling / eventLog moved to templates/cli-config.yaml (CLI config,
# not per-repo — decision-031). See that file for the webhook receiver / poller
# settings previously here.
