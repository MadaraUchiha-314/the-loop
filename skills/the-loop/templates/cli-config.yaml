# the-loop CLI configuration (cli-config.yaml) — not tied to any one repo.
# Validated against .the-loop/cli-config.schema.json.
#
# Read only by the CLI daemon (`the-loop gh-webhook`/`poll`/`sessions`/`events`),
# which is expected to work across multiple repos (decision-032). Resolved, in
# priority order:
#   1. --config / -c (explicit CLI flag)
#   2. $THE_LOOP_CLI_CONFIG (explicit env var, same priority as --config)
#   3. ./.the-loop/cli-config.yaml (repo-relative — track it in a specific
#      repo, e.g. a "dev box" repo, instead of your home directory)
#   4. ~/.the-loop/cli-config.yaml (the always-available fallback)
# Install this file at whichever of those paths suits your setup.
#
# See .the-loop/config.yaml (generated by `/the-loop:init` per repo) for the
# PLUGIN config — ticketing, workflow, tooling, reviews, autonomy, security, …

version: "0.1.0"

webhooks:
  ghWebhook:
    host: 127.0.0.1
    port: 8787
    path: /gh-webhook
    secretEnv: THE_LOOP_GH_WEBHOOK_SECRET   # env var holding the secret (not stored here)
    pidfile: .the-loop/gh-webhook.pid
    events: []   # e.g. [issues, issue_comment, pull_request, workflow_run]; empty = all
    routing:
      enabled: false                # route events to registered harness sessions
      registryDir: .the-loop/sessions
      defaultHarness: claude        # claude | cursor
      spawnOnUnmatched: labeled     # never | always | labeled
      autoExecuteLabel: "the-loop: auto-execute"   # label that opts an issue/PR into autonomous execution
      # SECURITY (prompt-injection guard): only these GitHub logins' actions are acted on
      # by BOTH the webhook receiver and the poller. Comments/reviews/labels/items from
      # anyone else are ignored. REQUIRED: no fallback to any repo's plugin config —
      # empty means human-authored events are all ignored (fail closed). Run your own
      # instance for your own login(s).
      authorizedUsers: []           # e.g. ["your-github-login"]
      spawnWorkdir: "."             # used only when workspace.root is unset (below)
      # Clone-and-worktree workspace (issue-76): when `root` is set, each event's
      # repo is cloned under <root>/<host>/<owner>/<repo> and the spawned session
      # runs in a per-work-item git worktree (worktrees under <root>/.worktrees/…),
      # cleaned up when the PR merges/closes. Empty root => legacy spawnWorkdir.
      # Auth is your own git credentials (e.g. `gh auth setup-git`).
      workspace:
        root: ""                    # e.g. ~/.the-loop/workspace (empty = disabled)
        cloneProtocol: https        # https | ssh
        defaultHost: github.com     # host dir when the payload has no html_url (set to your GHE domain)
        keepWorktreeOnClose: false  # keep a worktree after PR close (for post-mortem)
        gitBinary: git
      maxConcurrentDispatches: 4
      dedupCacheSize: 1024
      dispatchTimeoutSeconds: 1800
      promptTemplate: skills/the-loop/templates/webhook-event-prompt.md          # internal template; dispatcher falls back to a built-in default when absent
      spawnPromptTemplate: skills/the-loop/templates/webhook-autoexecute-prompt.md  # internal template; dispatcher falls back to a built-in default when absent
      harnessArgs:
        claude: []                  # e.g. [--permission-mode, acceptEdits]
        cursor: []                  # e.g. [--force]

# Pull-based, provider-agnostic ingress for hosts a webhook cannot reach
# (`the-loop poll start`). Each `sources` entry selects a provider the system
# interfaces with (github ships); discovered work drives the SAME routing/dispatch
# stack above (harness, runner, spawn policy, templates, session registry) — so no
# duplicate session is ever spawned for the same work item. The core carries no
# provider-specific knobs; provider settings live under the source entry.
polling:
  intervalSeconds: 60               # seconds between poll cycles (all sources)
  stateFile: .the-loop/poll-state.json
  sources: []                       # e.g. the github source below (empty = nothing polled)
    # - provider: github
    #   repos: []                   # REQUIRED: OWNER/REPO list — no fallback to any
    #                               # repo's plugin config; a source with none discovers nothing
    #   monitor:
    #     issues: true
    #     pullRequests: true
    #   label: ""                   # empty = reuse routing.autoExecuteLabel above
    #   ghBinary: gh                # uses your existing `gh auth` credentials

eventLog:                           # structured JSONL o11y trail; `the-loop events`
  enabled: true
  path: .the-loop/logs/events.jsonl
